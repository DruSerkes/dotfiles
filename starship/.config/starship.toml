# Starship prompt — https://starship.rs/config/
# Plain-text symbols so it renders without a Nerd Font. Install a Nerd Font
# (e.g. `brew install --cask font-meslo-lg-nerd-font`) and you can swap in the
# fancier glyphs from the docs.

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = ""
format = "[on $branch]($style) "
style = "bold purple"

[git_status]
style = "bold yellow"

[nodejs]
symbol = ""
format = "[node $version]($style) "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style = "dim yellow"
