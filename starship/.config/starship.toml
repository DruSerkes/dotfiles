# Starship prompt — https://starship.rs/config/
# Uses Nerd Font glyphs, written as \uXXXX escapes so the exact codepoints are
# preserved. Set your terminal font to "FiraCode Nerd Font Mono" to see them.
# Glyphs used:   git-branch    node    lock

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = "  "        # lock icon shown when the dir isn't writable
read_only_style = "red"

[git_branch]
symbol = " "            # git branch glyph
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "≡${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[nodejs]
symbol = " "            # node.js glyph
format = "[$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style = "dim yellow"
